# Restore-only job configuration for Linux or WSL.
#
# Do not store database passwords in this file.
# Use:
#   - PostgreSQL .pgpass
#   - MySQL option/defaults file
#   - Oracle Wallet
#   - Platform-specific credential stores
#
# Important:
# Paths beginning with /mnt/c are WSL paths.
# For native Linux, replace them with native Linux paths such as:
# /opt/db-restore-orchestrator/backups

tools:
  postgres:
    psql: "psql"
    pg_restore: "pg_restore"
    dropdb: "dropdb"
    createdb: "createdb"

  mysql:
    mysql: "mysql"

  oracle:
    impdp: "impdp"

alerts:
  enabled: false

  notify_on:
    success: true
    failure: true
    dry_run: false

  slack:
    enabled: false
    webhook_url_env: "DB_RESTORE_SLACK_WEBHOOK_URL"

  email:
    enabled: false
    smtp_host: "smtp.office365.com"
    smtp_port: 587
    username_env: "DB_RESTORE_SMTP_USERNAME"
    password_env: "DB_RESTORE_SMTP_PASSWORD"
    from_env: "DB_RESTORE_EMAIL_FROM"
    to:
      - "it-team@company.com"

jobs:
  - name: hris_postgres_restore
    enabled: true
    type: postgres

    backup_path: "/mnt/c/Projects/db-backups"
    file_pattern: "*.sql"

    schedule:
      enabled: true
      linux_cron: "0 3 * * *"

      # These Windows fields are retained because the current shared
      # configuration validator requires them when scheduling is enabled.
      windows_time: "03:00"
      windows_frequency: "DAILY"

    target:
      host: "localhost"
      port: 5432
      database: "hris_test"
      username: "postgres"
      maintenance_database: "postgres"
      credential_method: "pgpass"

    safety:
      require_confirmation: false
      block_if_name_contains:
        - "prod"
        - "production"
        - "live"

  - name: inventory_mysql_restore
    enabled: false
    type: mysql

    backup_path: "/mnt/c/Projects/db-backups"
    file_pattern: "*.sql.gz"

    schedule:
      enabled: false
      linux_cron: "30 3 * * *"
      windows_time: "03:30"
      windows_frequency: "DAILY"

    target:
      host: "localhost"
      port: 3306
      database: "inventory_test"
      username: "mysql_restore"
      credential_method: "defaults_file"

      # This must be an actual file, not a directory.
      # Create this file before enabling the MySQL job.
      defaults_file: "/etc/db-restore-orchestrator/mysql.cnf"

    safety:
      require_confirmation: false
      block_if_name_contains:
        - "prod"
        - "production"
        - "live"

  - name: accounting_oracle_restore
    enabled: false
    type: oracle

    backup_path: "/mnt/c/Projects/db-backups"
    file_pattern: "*.dmp"

    schedule:
      enabled: false
      linux_cron: "0 4 * * *"
      windows_time: "04:00"
      windows_frequency: "DAILY"

    target:
      connect_string: "/@ACCOUNTING_TEST"
      schema: "ACCOUNTING_TEST"
      oracle_directory: "ORCH_DUMP_DIR"
      credential_method: "oracle_wallet"

    safety:
      require_confirmation: false
      block_if_name_contains:
        - "prod"
        - "production"
        - "live"