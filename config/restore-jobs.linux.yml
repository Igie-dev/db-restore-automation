# Restore-only job configuration for Linux.
# Do not store database passwords in this file.
# Use .pgpass, MySQL login path/defaults file, Oracle Wallet, or platform-specific credential stores.

tools:
  postgres:
    psql: "psql"
    pg_restore: "pg_restore"
    dropdb: "dropdb"
    createdb: "createdb"

  mysql:
    mysql: "mysql"

  oracle:
    impdp: "impdp"
  
  oracle_rman:
    rman: "/u01/app/oracle/product/19c/dbhome_1/bin/rman"

alerts:
  enabled: false

  notify_on:
    success: true
    failure: true
    dry_run: false

  slack:
    enabled: false
    webhook_url_env: "DB_RESTORE_SLACK_WEBHOOK_URL"

  email:
    enabled: false
    smtp_host: "smtp.office365.com"
    smtp_port: 587
    username_env: "DB_RESTORE_SMTP_USERNAME"
    password_env: "DB_RESTORE_SMTP_PASSWORD"
    from_env: "DB_RESTORE_EMAIL_FROM"
    to:
      - "it-team@company.com"

jobs:
  - name: hris_postgres_restore
    enabled: true
    type: postgres
    backup_path: "/mnt/c/Projects/db-backups"
    file_pattern: "*.sql"
    
    schedule:
      enabled: true
      linux_cron: "0 3 * * *"
      windows_time: "03:00"
      windows_frequency: "DAILY"
    
    target:
      host: "localhost"
      port: 5432
      database: "hris_test"
      username: "postgres"
      credential_method: "pgpass"
      maintenance_database: "postgres"
    
    safety:
      require_confirmation: false
      block_if_name_contains:
        - prod
        - production
        - live

  - name: inventory_mysql_restore
    enabled: false
    type: mysql
    backup_path: "/mnt/c/Projects/db-backups"
    file_pattern: "*.sql.gz"
    
    schedule:
      enabled: false
      linux_cron: "30 3 * * *"
      windows_time: "03:30"
      windows_frequency: "DAILY"
    
    target:
      database: "inventory_test"
      credential_method: "defaults_file"
      defaults_file: "/mnt/c/Projects/db-backups"
    
    safety:
      require_confirmation: false
      block_if_name_contains:
        - prod
        - production
        - live

  - name: accounting_oracle_restore
    enabled: false
    type: oracle
    backup_path: "/mnt/c/Projects/db-backups"
    file_pattern: "*.dmp"
    
    schedule:
      enabled: false
      linux_cron: "0 4 * * *"
      windows_time: "04:00"
      windows_frequency: "DAILY"
    
    target:
      connect_string: "/@ACCOUNTING_TEST"
      schema: "ACCOUNTING_TEST"
      oracle_directory: "ORCH_DUMP_DIR"
      credential_method: "oracle_wallet"
    
    safety:
      require_confirmation: false
      block_if_name_contains:
        - prod
        - production
        - live



  - name: OracleRmanTestRestore
    enabled: false
    type: oracle_rman
          
    schedule:
      enabled: false
      linux_cron: "0 4 * * *"
      windows_time: ""
      windows_frequency: ""
    
    rman:
      target: "/"
      catalog: ""
      command_file: "/opt/db-restore-orchestrator/rman/restore-full-database.sample.rman"
      log_file: "/opt/db-restore-orchestrator/logs/oracle-rman-restore.log"
      credential_method: "os_auth"
      oracle_home: "/u01/app/oracle/product/19c/dbhome_1"
      oracle_sid: "ORCLTEST"
      restore_scope: "full_database"
    
    safety:
      require_confirmation: false
      block_if_name_contains:
        - prod
        - production
        - live
