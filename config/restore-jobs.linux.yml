# Restore-only job configuration for Linux or WSL.
#
# Do not store database passwords in this file.
# Use:
#   - PostgreSQL .pgpass
#   - MySQL option/defaults file
#   - Oracle Wallet
#   - Platform-specific credential stores
#
# Important:
# Paths beginning with /mnt/c are WSL paths.
# For native Linux, replace them with native Linux paths such as:
# /opt/db-restore-orchestrator/backups

tools:
  postgres:
    psql: "psql"
    pg_restore: "pg_restore"
    dropdb: "dropdb"
    createdb: "createdb"

  mysql:
    mysql: "mysql"

  oracle:
    impdp: "impdp"

  oracle_rman:
    # A bare "rman" is resolved against <oracle_home>/bin automatically.
    # Provide an absolute path here only to override that resolution.
    rman: "rman"

alerts:
  enabled: false

  notify_on:
    success: true
    failure: true
    dry_run: false

  slack:
    enabled: false
    webhook_url_env: "DB_RESTORE_SLACK_WEBHOOK_URL"

  email:
    enabled: false
    smtp_host: "smtp.office365.com"
    smtp_port: 587
    username_env: "DB_RESTORE_SMTP_USERNAME"
    password_env: "DB_RESTORE_SMTP_PASSWORD"
    from_env: "DB_RESTORE_EMAIL_FROM"
    to:
    - "it-team@company.com"

jobs:
- name: hris_postgres_restore
  enabled: true
  type: postgres
  timeout: "2h"

  backup_path: "/mnt/c/Projects/db-backups"
  file_pattern: "*.sql"

  schedule:
    enabled: true
    linux_cron: "0 3 * * *"

  target:
    host: "localhost"
    port: 5432
    database: "hris_test"
    username: "postgres"
    maintenance_database: "postgres"
    credential_method: "pgpass"

  safety:
    require_confirmation: false
    block_if_name_contains:
    - "prod"
    - "production"
    - "live"

- name: inventory_mysql_restore
  enabled: false
  type: mysql
  timeout: "2h"

  backup_path: "/mnt/c/Projects/db-backups"
  file_pattern: "*.sql.gz"

  schedule:
    enabled: false
    linux_cron: "30 3 * * *"

  target:
    host: "localhost"
    port: 3306
    database: "inventory_test"
    username: "mysql_restore"
    credential_method: "defaults_file"

    # This must be an actual file, not a directory.
    # Create this file before enabling the MySQL job.
    defaults_file: "/etc/db-restore-orchestrator/mysql.cnf"

  safety:
    require_confirmation: false
    block_if_name_contains:
    - "prod"
    - "production"
    - "live"

- name: accounting_oracle_restore
  enabled: false
  type: oracle
  timeout: "2h"

  backup_path: "/mnt/c/Projects/db-backups"
  file_pattern: "*.dmp"

  schedule:
    enabled: false
    linux_cron: "0 4 * * *"

  target:
    connect_string: "/@ACCOUNTING_TEST"
    schema: "ACCOUNTING_TEST"
    oracle_directory: "ORCH_DUMP_DIR"
    credential_method: "oracle_wallet"

  safety:
    require_confirmation: false
    block_if_name_contains:
    - "prod"
    - "production"
    - "live"

- name: sample_rman_restore

  # Oracle RMAN executes a DBA-approved command file.
  # Enable only after validating paths and Oracle configuration.
  enabled: false
  type: oracle_rman
  timeout: "8h"

  schedule:
    enabled: false
    linux_cron: "0 2 * * *"

  rman:
    # OS authentication example.
    # Alternative:
    # target: "/@TNS_ALIAS" (for Oracle Wallet usage)
    target: "/"
    credential_method: "os_auth"

    # Repository-safe sample paths
    command_file: "/opt/db-restore-orchestrator/rman/restore-sample.rman"
    log_file: "/opt/db-restore-orchestrator/logs/sample_rman.log"

    # Example Oracle installation path
    oracle_home: "/u01/app/oracle/product/12.x.x/dbhome_1"

    # Example SID
    oracle_sid: "SAMPLEDB"

    # Supported values may vary depending on implementation
    restore_scope: "full_database"

  safety:
    require_confirmation: false

    # Prevent accidental execution against production environments
    block_if_name_contains:
    - "prod"
    - "production"
    - "live"
